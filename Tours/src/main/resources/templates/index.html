<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мир Путешествий - Наши Туры</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🌍 TourAgency</a>
        <div class="navbar-nav ms-auto">
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col">
            <h1 class="display-5">Доступные направления</h1>
            <p class="lead">Выберите тур своей мечты прямо сейчас</p>
        </div>
    </div>

    <div class="row">
        <div th:each="tour : ${tours}" class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${tour.title}">Название тура</h5>
                    <h6 class="card-subtitle mb-2 text-muted" th:text="${tour.country}">Страна</h6>
                    <p class="card-text" th:text="${tour.description}">Описание тура...</p>
                </div>
                <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center">
                    <span class="h5 text-primary mb-0" th:text="${tour.price} + ' $'">0 $</span>
                    <button class="btn btn-success">Забронировать</button>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${tours.isEmpty()}" class="alert alert-info text-center">
        На данный момент доступных туров не найдено.
    </div>
</div>

</body>
</html>
