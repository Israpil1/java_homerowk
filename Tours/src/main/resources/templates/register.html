<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Регистрация</title>
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Регистрация</h3>
                    <form th:action="@{/register}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Логин</label>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="Придумайте имя" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Минимум 6 символов" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Создать аккаунт</button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <a href="/login" class="text-decoration-none">Уже есть аккаунт? Войти</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
